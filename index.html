<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>IPTV Stable Final</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body { margin:0; background:black; }
video { width:100%; height:100vh; }
#hud {
  position:fixed; top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  padding:6px;
  font-size:12px;
}
</style>
</head>
<body>
<div id="hud">Loading...</div>
<video id="video" controls autoplay muted></video>
<script>
const API_URL = "https://ddl.royrover.workers.dev/ddl/DDL_P.php";

// ===== หา VID จาก ?vid= ก่อน ถ้าไม่มีลองอ่านจาก path /premuimXX/chunks.m3u8 =====
function getVid() {
  const qs_vid = new URLSearchParams(location.search).get("vid");
  if (qs_vid) return qs_vid;

  const redirect_path = sessionStorage.getItem("redirect_path");
  if (redirect_path) {
    sessionStorage.removeItem("redirect_path");
    const m = redirect_path.match(/premuim(\d+)/);
    if (m) return m[1];
  }
  return null;
}

const VID = getVid();
let hls;
let current_stream_url = "";
async function loadStream() {
  try {
    const res = await fetch(`${API_URL}?vid=${VID}`);
    const data = await res.json();
    if (!data.stream_url) {
      throw new Error("no_stream_url");
    }
    const proxy_stream_url = data.stream_url;
    if (current_stream_url === proxy_stream_url) return;
    current_stream_url = proxy_stream_url;
    if (hls) hls.destroy();
    hls = new Hls({
      maxBufferLength: 10,
      enableWorker: true
    });
    hls.loadSource(proxy_stream_url);
    hls.attachMedia(document.getElementById("video"));
  } catch (e) {
    console.log("ERROR:", e.message);
  }
}
loadStream();
</script>
</body>
</html>
