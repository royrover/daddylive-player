<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>IPTV Stable Final</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:black; }
video { width:100%; height:100vh; }
#hud {
  position:fixed; top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  padding:6px;
  font-size:12px;
}
</style>
</head>

<body>

<div id="hud">Loading...</div>
<video id="video" controls autoplay muted></video>

<script>
const API = "http://dootvz.myds.me:9988/db66/DDL_P.php";
const vid = new URLSearchParams(location.search).get("vid");

let hls;
let currentStream = null;

const video = document.getElementById("video");
const hud = document.getElementById("hud");

async function load() {
  try {
    hud.innerText = "Resolving...";

    const res = await fetch(`${API}?vid=${vid}`);
    const data = await res.json();

    if (!data.stream) throw new Error("no stream");

    const stream = `${WORKER}/proxy/${encodeURIComponent(data.stream.replace("https://",""))}`;
    hud.innerText = "Playing...";

    if (stream === currentStream) {
      setTimeout(load, (data.ttl - 5) * 1000);
      return;
    }

    currentStream = stream;

    if (hls) hls.destroy();

    hls = new Hls({
      maxBufferLength: 5,
      liveSyncDurationCount: 3,
      enableWorker: true
    });

    hls.loadSource(stream);
    hls.attachMedia(video);

    hls.on(Hls.Events.ERROR, function(event, data) {
      console.log("HLS ERROR:", data);

      if (data.fatal) {
        hud.innerText = "Recovering stream...";

        setTimeout(() => {
          load(); // 🔥 auto recover
        }, 2000);
      }
    });

    setTimeout(load, (data.ttl - 5) * 1000);

  } catch (e) {
    hud.innerText = "Error: " + e.message;

    setTimeout(load, 5000); // retry loop
  }
}

load();
</script>

</body>
</html>
