<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>IPTV Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:black; }
video { width:100%; height:100vh; }
#hud {
  position:fixed; top:10px; left:10px;
  color:white; font-size:12px;
  background:rgba(0,0,0,0.5);
  padding:6px;
}
</style>
</head>

<body>

<div id="hud">loading...</div>
<video id="v" controls autoplay muted></video>

<script>
const API = "https://ddl.royrover.workers.dev";
const VID = 54;

let hls;
let lastStream = "";
let timer;

async function load() {
  const res = await fetch(`${API}/?vid=${VID}`);
  const data = await res.json();

  document.getElementById("hud").innerText =
    "TTL: " + data.ttl;

  if (!data.stream) return;

  // 🔥 ไม่ reload ถ้า stream เดิม
  if (data.stream === lastStream) {
    schedule(data.ttl);
    return;
  }

  lastStream = data.stream;

  if (hls) hls.destroy();

  if (Hls.isSupported()) {
    hls = new Hls({
      maxBufferLength: 5,
      liveSyncDurationCount: 3,
    });

    hls.loadSource(data.stream);
    hls.attachMedia(document.getElementById("v"));
  } else {
    document.getElementById("v").src = data.stream;
  }

  schedule(data.ttl);
}

function schedule(ttl) {
  clearTimeout(timer);
  timer = setTimeout(load, (ttl - 5) * 1000);
}

load();
</script>

</body>
</html>
