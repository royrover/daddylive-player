<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>IPTV Stable Final</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:black; }
video { width:100%; height:100vh; }
#hud {
  position:fixed; top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  padding:6px;
  font-size:12px;
}
</style>
</head>

<body>

<div id="hud">Loading...</div>
<video id="video" controls autoplay muted></video>

<script>
const API = "https://ddl.royrover.workers.dev";
const vid = new URLSearchParams(location.search).get("vid");

const video = document.getElementById("video");
const hud = document.getElementById("hud");

let hls;

async function load() {
  try {
    hud.innerText = "Resolving...";

    const r = await fetch(`${API}/?vid=${vid}`);
    const data = await r.json();

    console.log("RESOLVE:", data);

    if (!data.stream) {
      throw new Error("NO STREAM FROM API");
    }

    hud.innerText = "Loading stream...";

    if (hls) hls.destroy();

    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true
    });

    hls.on(Hls.Events.ERROR, (e, d) => {
      console.log("HLS ERROR:", d);
      hud.innerText = "HLS ERROR: " + d.type;
    });

    hls.loadSource(data.stream);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      hud.innerText = "PLAYING";
      video.play();
    });

  } catch (e) {
    console.error(e);
    hud.innerText = "FAILED: " + e.message;
  }
}

load();
</script>

</body>
</html>
