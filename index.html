<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>IPTV Player</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    video {
      width: 100%;
      height: 100vh;
      background: black;
    }

    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      font-size: 12px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="hud" id="hud">Loading...</div>
<video id="video" controls autoplay muted></video>

<script>
const WORKER = "https://ddl.royrover.workers.dev";
const VID = 54;

let hls;
let currentStream = "";
let refreshTimer = null;

const video = document.getElementById("video");
const hud = document.getElementById("hud");

// ================================
// LOAD STREAM
// ================================
async function loadStream() {
  try {
    hud.innerText = "Fetching stream...";

    const res = await fetch(`${WORKER}/?vid=${VID}`);
    const data = await res.json();

    if (!data.stream) {
      hud.innerText = "No stream";
      return;
    }

    hud.innerText = "Playing... TTL " + data.ttl;

    // ================================
    // ถ้า stream เดิม → ไม่ reload
    // ================================
    if (currentStream === data.stream) {
      hud.innerText = "Same stream (skip reload)";
      scheduleRefresh(data.ttl);
      return;
    }

    currentStream = data.stream;

    // ================================
    // reset player
    // ================================
    if (hls) {
      hls.destroy();
      hls = null;
    }

    // ================================
    // HLS PLAY
    // ================================
    if (Hls.isSupported()) {
      hls = new Hls({
        maxBufferLength: 5,
        liveSyncDurationCount: 3,
      });

      hls.loadSource(data.stream);
      hls.attachMedia(video);

    } else {
      video.src = data.stream;
    }

    scheduleRefresh(data.ttl);

  } catch (err) {
    hud.innerText = "Error loading stream";
    console.error(err);
  }
}

// ================================
// AUTO REFRESH CONTROLLER
// ================================
function scheduleRefresh(ttl) {
  if (refreshTimer) clearTimeout(refreshTimer);

  // refresh ก่อนหมดอายุ 5 วิ
  const refreshTime = (ttl - 5) * 1000;

  refreshTimer = setTimeout(() => {
    loadStream();
  }, refreshTime);
}

// start
loadStream();
</script>

</body>
</html>
