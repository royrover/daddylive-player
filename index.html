<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>NUtv Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:black; }
video { width:100%; height:100vh; }
#hud {
  position:fixed; top:10px; left:10px;
  color:white; background:#0008;
  padding:8px; font-size:12px;
}
</style>
</head>

<body>

<div id="hud">loading...</div>
<video id="video" controls autoplay muted></video>

<script>
const WORKER = "https://ddl.royrover.workers.dev";
const VID = 54;

let hls;
let current = "";

async function load() {
  try {
    const res = await fetch(`${WORKER}/?vid=${VID}`);
    const data = await res.json();

    if (!data.stream) return;

    document.getElementById("hud").innerText =
      "TTL " + data.ttl;

    if (current === data.stream) return;

    current = data.stream;

    if (hls) hls.destroy();

    hls = new Hls({
      maxBufferLength: 5,
      liveSyncDurationCount: 3
    });

    hls.loadSource(data.stream);
    hls.attachMedia(document.getElementById("video"));

    hls.on(Hls.Events.ERROR, function(_, d) {
      if (d.fatal) {
        hls.destroy();
        setTimeout(load, 2000);
      }
    });

  } catch (e) {
    document.getElementById("hud").innerText =
      "retrying...";
    setTimeout(load, 2000);
  }
}

// auto refresh
setInterval(load, 110000);
load();
</script>

</body>
</html>
