<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>IPTV Player Stable</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:black; color:white; font-family:Arial; }
video { width:100%; height:100vh; }
#hud {
  position:fixed; top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  padding:6px; font-size:12px;
}
</style>
</head>

<body>

<div id="hud">Loading...</div>
<video id="video" controls autoplay muted></video>

<script>
const API = "http://dootvz.myds.me:9988/db66/DDL_P.php";
const WORKER = "https://ddl.royrover.workers.dev";
const vid = new URLSearchParams(location.search).get("vid");

let hls;
let currentStream = "";
const video = document.getElementById("video");
const hud = document.getElementById("hud");

async function load() {
  try {
    hud.innerText = "Resolving...";

    const r = await fetch(`${API}?vid=${vid}`);
    const data = await r.json();

    if (!data.stream) throw new Error("no stream");

    const stream = `${WORKER}/proxy/${data.stream.replace("https://","")}`;

    hud.innerText = "Playing...";

    if (stream === currentStream) return;

    currentStream = stream;

    if (hls) hls.destroy();

    hls = new Hls({
      maxBufferLength: 5,
      liveSyncDurationCount: 3
    });

    hls.on(Hls.Events.ERROR, (e,d)=> {
      console.log("HLS ERROR", d);
      hud.innerText = "Stream error retrying...";
    });

    hls.loadSource(stream);
    hls.attachMedia(video);

    setTimeout(load, (data.ttl - 5) * 1000);

  } catch (e) {
    hud.innerText = "Error: " + e.message;
  }
}

load();
</script>

</body>
</html>
