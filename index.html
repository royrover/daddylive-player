<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>IPTV Player</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
    }

    video {
      width: 100%;
      height: 100vh;
      background: black;
    }

    .hud {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      font-size: 12px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="hud" id="hud">Loading...</div>
<video id="video" controls autoplay muted></video>

<script>
const WORKER = "https://ddl.royrover.workers.dev";
const VID = 54;

let hls;
let currentStream = "";
let refreshTimer = null;

const video = document.getElementById("video");
const hud = document.getElementById("hud");

// ================================
// CHECK STREAM FIRST
// ================================
async function getStream() {
  const res = await fetch(`${WORKER}/?vid=${VID}`);

  if (!res.ok) {
    throw new Error("Resolver failed: " + res.status);
  }

  return await res.json();
}

// ================================
// LOAD STREAM
// ================================
async function loadStream() {
  try {
    hud.innerText = "Fetching stream...";

    const data = await getStream();

    if (!data.stream) {
      hud.innerText = "No stream found";
      return;
    }

    hud.innerText = "Checking stream...";

    // ================================
    // test stream ก่อนใช้จริง
    // ================================
    const test = await fetch(data.stream, { method: "HEAD" });

    if (!test.ok) {
      hud.innerText = "Stream expired or blocked: " + test.status;
      return;
    }

    hud.innerText = "Playing... TTL " + data.ttl;

    if (currentStream === data.stream) {
      scheduleRefresh(data.ttl);
      return;
    }

    currentStream = data.stream;

    if (hls) {
      hls.destroy();
      hls = null;
    }

    if (Hls.isSupported()) {
      hls = new Hls({
        maxBufferLength: 5,
        liveSyncDurationCount: 3,
      });

      hls.loadSource(data.stream);
      hls.attachMedia(video);

    } else {
      video.src = data.stream;
    }

    scheduleRefresh(data.ttl);

  } catch (err) {
    hud.innerText = "Error: " + err.message;
    console.error(err);
  }
}

// ================================
// AUTO REFRESH (กัน token หมดอายุ)
// ================================
function scheduleRefresh(ttl) {
  if (refreshTimer) clearTimeout(refreshTimer);

  const refreshTime = Math.max(5, ttl - 10) * 1000;

  refreshTimer = setTimeout(() => {
    loadStream();
  }, refreshTime);
}

loadStream();
</script>

</body>
</html>
