<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>IPTV Stable Final</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:black; }
video { width:100%; height:100vh; }
#hud {
  position:fixed; top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  padding:6px;
  font-size:12px;
}
</style>
</head>

<body>

<div id="hud">Loading...</div>
<video id="video" controls autoplay muted></video>

<script>
const API = "http://dootvz.myds.me:9988/db66/DDL_P.php";
const WORKER = "https://ddl.royrover.workers.dev";

const vid = new URLSearchParams(location.search).get("vid");

let hls;
let video = document.getElementById("video");

async function load() {
  const r = await fetch(API + "?vid=" + vid);
  const data = await r.json();

  // ❗ ต้องเป็น master ผ่าน worker เท่านั้น
  const stream = WORKER + "/proxy/" + data.master.replace("https://", "");

  if (hls) hls.destroy();

  hls = new Hls({
    maxBufferLength: 10,
    enableWorker: true
  });

  hls.loadSource(stream);
  hls.attachMedia(video);
}

load();
</script>

</body>
</html>
