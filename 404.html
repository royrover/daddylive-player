<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<script>
  // เก็บ path เดิมไว้ใน sessionStorage แล้ว redirect กลับไป index.html
  sessionStorage.setItem("redirect_path", location.pathname);
  location.replace(location.origin + location.pathname.split("/").slice(0, 2).join("/") + "/");
</script>
</head>
<body></body>
</html>
